name: Publish opkg feed

on:
  push:
    branches:
      - main
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build feed
        run: make feed

      - name: Publish feed branch
        run: |
          set -eu
          rm -rf /tmp/keensnap-feed
          mkdir -p /tmp/keensnap-feed
          cp -a out/feed/. /tmp/keensnap-feed/

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout --orphan gh-pages
          git rm -rf . >/dev/null 2>&1 || true
          cp -a /tmp/keensnap-feed/. .
          git add -A
          git commit -m "Publish opkg feed"
          git push --force origin gh-pages
